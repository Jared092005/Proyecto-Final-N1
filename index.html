<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./style.css" />
    <script type="module" src="./scripts/main.js"></script>
    <title>proyecto-windbnb</title>
  </head>
  <body class="min-h-screen">
    <header class="lg:flex lg:justify-between">
      <img
        src="./designs/icons/logo-f7862584.svg"
        alt="logo-windbnb"
        class="p-4 lg:px-10 lg:py-6"
      />
      <span
        class="flex px-7 py-5 relative justify-center lg:w-1/2 lg:justify-center"
      >
        <input
          type="text"
          readonly
          class="p-2.5 rounded-l-2xl shadow w-33 outline-none"
          placeholder="  Add location"
          id="input-location"
        />
        <input
          class="p-2.5 shadow w-33 outline-none"
          type="text"
          readonly
          placeholder="   Add guests"
          id="input-guest"
        />
        <button id="search-icon" class="p-3.5 shadow rounded-r-2xl lg:right-20">
          <img src="./designs/icons/search.svg" alt="search-icon" class="w-4" />
        </button>
      </span>
    </header>
    <section
      id="filters"
      class="hidden absolute bg-white w-full py-6 px-6 top-0 z-50"
    >
      <span class="flex justify-between">
        <h2 class="font-semibold lg:hidden">Edit your search</h2>
        <img
          src="./designs/icons/cancel-close-delete-svgrepo-com.svg"
          alt="go back"
          class="w-7"
          id="close-button"
        />
      </span>
      <section class="w-full mt-4 relative lg:flex lg:px-8">
        <div class="pt-6 pb-4 px-3 rounded-t-xl shadow lg:rounded-l-xl lg:w-90">
          <label
            for="Location"
            class="absolute text-[14px] font-semibold top-1 left-5 lg:left-13"
            >Location</label
          >
          <input
            type="text"
            placeholder="Where are you going?"
            class="w-full outline-none pl-2"
          />
        </div>
        <div class="pt-6 pb-4 px-3 rounded-b-xl shadow lg:rounded-r-2xl">
          <label
            for="Guests"
            class="absolute text-[14px] font-semibold bottom-9 left-5 lg:left-3/7"
            >Guests</label
          >
          <input
            type="text"
            readonly
            placeholder="  "
            class="w-full outline-none pl-2 lg:w-90"
            id="input-guests"
          />
        </div>
        <span class="hidden w-full lg:flex lg:absolute lg:bottom-2 lg:left-5/6"
          ><div
            class="flex mt-35 mbs-2.5 justify-center border py-2 px-2 w-30 gap-3 bg-[#e65757] text-white rounded-2xl active:bg-[#dd3838]"
          >
            <img
              src="./designs/icons/icons8-search.svg"
              alt="search"
              class="w-4"
            />
            <p>search</p>
          </div></span
        >
      </section>
      <section
        id="filter-container"
        class="flex flex-col mt-8 lg:justify-center"
      >
        <span class="w-full lg:flex lg:flex-col lg:items-center"
          ><h2 class="font-semibold">Adults</h2>
          <p class="text-gray-400">Ages 13 or above</p>
          <div class="flex justify-between w-33 py-4 px-1">
            <button
              id="decrease-button"
              class="bg-gray-300 w-6 rounded-md border border-gray-500 active:bg-gray-400"
            >
              -
            </button>
            <p id="number">0</p>
            <button
              id="increase-btn"
              class="bg-gray-300 w-6 rounded-md border border-gray-500 active:bg-gray-400"
            >
              +
            </button>
          </div>
        </span>
        <span class="w-full mt-8 lg:flex lg:flex-col lg:items-center lg:mb-4"
          ><h2 class="font-semibold">Children</h2>
          <p class="text-gray-400">Ages 13 or above</p>
          <div class="flex justify-between w-33 py-4 px-1">
            <button
              id="decrease-btn2"
              class="bg-gray-300 w-6 rounded-md border border-gray-500 active:bg-gray-400"
            >
              -
            </button>
            <p id="number1">0</p>
            <button
              id="increase-btn2"
              class="bg-gray-300 w-6 rounded-md border border-gray-500 active:bg-gray-400"
            >
              +
            </button>
          </div>
        </span>
      </section>
      <span class="w-full flex justify-center"
        ><div
          class="flex mt-35 mbs-2.5 justify-center border py-2 px-2 w-30 gap-3 bg-[#e65757] text-white rounded-2xl active:bg-[#dd3838] lg:hidden"
        >
          <img
            src="./designs/icons/icons8-search.svg"
            alt="search"
            class="w-4"
          />
          <p>search</p>
        </div></span
      >
    </section>
    <main class="relative">
      <div
        id="background-opacity"
        class="hidden absolute inset-0 bg-black/40 z-40"
      ></div>
      <section class="flex justify-between px-4 py-4">
        <h1 class="font-bold text-2xl">Stays in Finland</h1>
        <p id="total-stays" class="text-gray-600 pt-1">12+ Stays</p>
      </section>
      <section
        id="cards-apartamentos"
        class="grid grid-cols-1 gap-4 md:grid-cols-2 lg:grid-cols-3 z-10"
      ></section>
    </main>
  </body>
</html>
